# Local-host testing stack — CURRENT deployment target (per @jackychenc 2026-07-08).
# `docker compose up` brings up db + redis + api + batch. API at http://127.0.0.1:8000.
# Web (Next.js) is roadmap step 8 — added as a `web` service (127.0.0.1:3000) then, not in Foundation.
# All host port bindings are pinned to 127.0.0.1 (loopback only) for local-security gate (task #7).
# Secrets come from .env (see .env.example) — never commit real keys.
version: "3.9"

services:
  db:
    image: timescale/timescaledb:2.16.1-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stockapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockapp}
      POSTGRES_DB: ${POSTGRES_DB:-stockapp}
    ports: ["127.0.0.1:5432:5432"]
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["127.0.0.1:6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: { context: ., dockerfile: Dockerfile }
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-stockapp}:${POSTGRES_PASSWORD:-stockapp}@db:5432/${POSTGRES_DB:-stockapp}
      REDIS_URL: redis://redis:6379/0
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?set APP_ENCRYPTION_KEY in .env}  # pgcrypto key (NFR-05)
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      ENV: local
    ports: ["127.0.0.1:8000:8000"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  # ─────────────────────────────────────────────────────────────────
  # BATCH runs ON THE HOST, not as a container (ADR-008, task #19).
  # The colima VM's egress IP is blocked by TPEx's Cloudflare WAF, so a
  # containerized batch can't reach the TW data sources; the Mac host can.
  # Run it on the host (needs Python 3.12 + uv, user-scope Homebrew), pointing
  # at the containerized Postgres/Redis over loopback:
  #
  #   # from repo root, host shell:
  #   export DATABASE_URL=postgresql+psycopg://stockapp:stockapp@127.0.0.1:5432/stockapp
  #   export REDIS_URL=redis://127.0.0.1:6379/0
  #   export APP_ENCRYPTION_KEY=...   # from host .env; same key as the api container
  #   export ENV=local
  #   uv run python -m app.batch.scheduler          # daily 03:00 TW
  #   # or one-shot: uv run python -m app.batch.run_now
  #
  # DB/Redis ports are loopback-only (127.0.0.1) — the host batch is on the same
  # machine, so no exposure is widened. Fixture-mode (no live egress) can still run
  # in-container; only the LIVE TW-source ingestion must run on the host.
  # ─────────────────────────────────────────────────────────────────

volumes:
  db_data:
